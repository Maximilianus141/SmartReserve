spring:
  application:
    name: smartreserve
    timezone: Europe/Zurich
  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/m-295-smartreserve
    username: postgres
    password: admin
    driverClassName: org.postgresql.Driver
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/smartreserve
server:
  port: 9090